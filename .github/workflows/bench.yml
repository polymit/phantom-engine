name: Benchmarks (Criterion)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

jobs:
  bench:
    name: Criterion Benchmarks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target/
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Criterion benchmarks
        run: |
          cargo bench --workspace -- --output-format=bencher 2>&1 \
            | tee bench_output.txt

      - name: Upload benchmark results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: criterion-results-${{ github.sha }}
          path: |
            target/criterion/
            bench_output.txt
          retention-days: 90

      - name: Benchmark comparison (GitHub Actions benchmark tracker)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: docs/benchmarks

      - name: Print benchmark targets
        run: |
          echo "Benchmark targets:"
          echo "CCT 1000-node serialization: <5ms"
          echo "Session startup QuickJS: <10ms"
          echo "Session startup V8: <50ms"
          echo "Review Criterion HTML reports in target/criterion/"
