name: Docker Build + Full Scale Test

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PHANTOM_API_KEY: "ci-docker-api-key"
  PHANTOM_SNAPSHOT_KEY: "ci-docker-snapshot-key"

jobs:
  docker-build:
    name: Build Docker Image (Multi-Stage cargo-chef + sccache)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          platforms: linux/amd64,linux/arm64

  scale-test-full:
    name: Full Scale Test (1000 Sessions in Docker)
    needs: docker-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Start observability stack (Prometheus + Grafana)
        run: |
          docker compose -f docker-compose.yml up -d prometheus grafana
          timeout 60 bash -c 'until curl -sf http://localhost:9090/-/ready; do sleep 2; done'
          echo "Prometheus ready"

      - name: Start Phantom Engine
        run: |
          docker compose -f docker-compose.yml up -d phantom
          timeout 30 bash -c 'until curl -sf http://localhost:8080/health; do sleep 2; done'
          echo "Phantom Engine ready"

      - name: Run full 1000-session scale test (cargo test inside container)
        run: |
          docker compose -f docker-compose.yml exec -T phantom \
            cargo test --package phantom-mcp --test scale_test scale_full_1000 \
              -- --nocapture --test-threads=1

      - name: Verify Prometheus metrics populated
        run: |
          SESSIONS=$(curl -s 'http://localhost:9090/api/v1/query?query=sessions_active' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['data']['result'])")
          echo "Prometheus sessions_active: $SESSIONS"
          HTTP=$(curl -s 'http://localhost:9090/api/v1/query?query=http_requests_total' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d['data']['result']))")
          echo "http_requests_total series: $HTTP"

      - name: Print final Prometheus metric snapshot
        run: |
          curl -s http://localhost:8080/metrics | grep -E "^(sessions|js_|http_|dom_|storage_)"
        if: always()

      - name: Docker Compose logs on failure
        run: docker compose -f docker-compose.yml logs --tail=200
        if: failure()

      - name: Tear down stack
        run: docker compose -f docker-compose.yml down -v
        if: always()
