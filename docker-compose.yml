version: "3.9"

services:
  phantom:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=gha
    image: ghcr.io/polymit/phantom-engine:latest
    container_name: phantom-engine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - phantom-storage:/data
    environment:
      PHANTOM_BIND_ADDR: 0.0.0.0:8080
      PHANTOM_STORAGE_DIR: /data/storage
      PHANTOM_API_KEY: ${PHANTOM_API_KEY}
      PHANTOM_SNAPSHOT_KEY: ${PHANTOM_SNAPSHOT_KEY}
      PHANTOM_LOG_FORMAT: json
      PHANTOM_SESSION_LIMIT: ${PHANTOM_SESSION_LIMIT:-1000}
      PHANTOM_RATE_LIMIT_PER_HOUR: ${PHANTOM_RATE_LIMIT:-100}
      RUST_LOG: phantom=info,tower_http=warn
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - phantom-net
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: "8"
        reservations:
          memory: 4G

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: phantom-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules/:/etc/prometheus/rules/:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phantom-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: phantom-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning/:ro
      - ./grafana/dashboards/:/var/lib/grafana/dashboards/:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-phantom-dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DATASOURCES_DEFAULT_NAME: Prometheus
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - phantom-net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: phantom-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - phantom-net

volumes:
  phantom-storage:
  prometheus-data:
  grafana-data:

networks:
  phantom-net:
    driver: bridge
