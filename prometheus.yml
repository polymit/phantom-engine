---
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    project: phantom-engine
    version: v0.1

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: phantom-engine
    static_configs:
      - targets: ["phantom:8080"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
