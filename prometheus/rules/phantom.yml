groups:
  - name: phantom.sessions
    rules:
      # Alert: sessions_active drops to 0 (engine crashed)
      - alert: PhantomEngineDown
        expr: up{job="phantom-engine"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Phantom Engine is down"
          description: "No metrics received from Phantom Engine for 1 minute."

      # Alert when the runtime pool circuit breaker is open.
      - alert: RuntimePoolCircuitOpen
        expr: phantom_circuit_breaker_state{state="open"} == 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Runtime pool circuit breaker is OPEN"
          description: "Pool exhaustion detected. New sessions are failing fast."

      # Alert: memory approaching limit
      - alert: HighSessionMemory
        expr: storage_quota_used_bytes > 40 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Session storage approaching 40MB per session"
          description: "Session {{ $labels.session_id }} storage: {{ $value | humanize }}"
